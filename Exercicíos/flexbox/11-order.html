<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundamentos - Order</title>

    <style>
        .flex-container {
            display: flex;
            max-width: 350px;
            border: 1px solid black;
            margin-bottom: 20px;
        }

        .item {
            flex: 1;
            background-color: rgb(157, 0, 255);
            color: white;
            text-align: center;
            font-size: 24px;
            margin: 4px;
        }

        .o-l {
            order: -1;
        }

        .o-2 {
            order: -2;
        }

        .o-3 {
            order: -3;
        }

        .ol {
            order: 1;
        }

        .o2 {
            order: 2;
        }

        .o3 {
            order: 3;
        }

        .o4 {
            order: 4;
        }

        .direction {
            flex-direction: column;
        }
    </style>
</head>
<body>
    <h1>Row</h1>
    <p>Order: 0</p>
    <div class="flex-container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
    </div>

    <p>Orders: diferentes</p>
    <div class="flex-container">
        <div class="item o4">1</div>
        <div class="item o-3">2</div>
        <div class="item o-1">3</div>
        <div class="item o2">4</div>
    </div>

    <p>Orders: Column</p>
    <div class="flex-container direction">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
    </div>

    <p>Orders: Column diferentes</p>
    <div class="flex-container direction">
        <div class="item o4">1</div>
        <div class="item o3">2</div>
        <div class="item o1">3</div>
        <div class="item o-2">4</div>
    </div>
</body>
</html>
